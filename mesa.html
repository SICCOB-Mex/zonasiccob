<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Privado - Proveedores</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/dataTables.bootstrap5.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/buttons/2.4.1/css/buttons.bootstrap5.min.css">
    
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        #login-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-card { width: 400px; padding: 30px; border-radius: 15px; background: white; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        #main-content { display: none; padding: 30px; }
        .badge-general { background-color: #0d6efd; color: white; padding: 5px 10px; border-radius: 8px; }
        .badge-n10 { background-color: #dc3545; color: white; padding: 5px 10px; border-radius: 8px; }
        .dt-buttons { margin-bottom: 15px; }
    </style>
</head>
<body>

<div id="login-container">
    <div class="login-card text-center">
        <h3 class="mb-4">🔒 Acceso Privado</h3>
        <p class="text-muted small">Ingresa tu correo autorizado para ver el listado</p>
        <div class="mb-3 text-start">
            <label class="form-label">Correo Personal</label>
            <input type="email" id="emailInput" class="form-control" placeholder="ejemplo@correo.com">
        </div>
        <button onclick="validarAcceso()" class="btn btn-primary w-100">Entrar al Sistema</button>
        <div id="errorMsg" class="text-danger mt-3 small" style="display:none;">Correo no autorizado.</div>
    </div>
</div>

<div id="main-content" class="container-fluid">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>🏢 Consolidado de Proveedores</h2>
        <button onclick="cerrarSesion()" class="btn btn-outline-danger btn-sm">Cerrar Sesión</button>
    </div>

    <div class="card shadow p-4">
        <div class="mb-3">
            <h5>Descargar Listado:</h5>
            <div id="botonesExportar"></div>
        </div>

        <table id="tablaMaestra" class="table table-hover w-100">
            <thead class="table-dark">
                <tr>
                    <th>#</th>
                    <th>Sucursal</th>
                    <th>Estado</th>
                    <th>Listado</th>
                    <th>Asignación</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/dataTables.bootstrap5.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/dataTables.buttons.min.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.bootstrap5.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/pdfmake.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.1.53/vfs_fonts.js"></script>
<script src="https://cdn.datatables.net/buttons/2.4.1/js/buttons.html5.min.js"></script>

<script>
    // --- CONFIGURACIÓN DE ACCESO ---
    const CORREOS_AUTORIZADOS = ["shernandez@siccob.com.mx", "admin@empresa.com"];

    function validarAcceso() {
        const email = document.getElementById('emailInput').value.toLowerCase();
        if (CORREOS_AUTORIZADOS.includes(email)) {
            document.getElementById('login-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            inicializarTabla();
        } else {
            document.getElementById('errorMsg').style.display = 'block';
        }
    }

    function cerrarSesion() {
        location.reload();
    }

    // --- DATOS Y TABLA ---
    const dataset = [
        [1, "Altavista", "CDMX", "General", "-"],
        [2, "Centro Telmex", "CDMX", "General", "-"],
        [8, "Jardines Tultitlan", "Edo Mex.", "General", "-"],
        [24, "Puerto Paraiso", "Baja California Sur", "General", "-"],
        [31, "AGUASCALIENTES", "AGUASCALIENTES", "No Atiende", "N10"],
        [33, "PUERTO PARAISO PLATINO", "BAJA CALIFORNIA SUR", "No Atiende", "N10"],
        [46, "PLAZA BUGAMBILIA PLATINO", "MORELOS", "No Atiende", "N10"]
        // ... (puedes agregar el resto de los datos aquí)
    ];

    function inicializarTabla() {
        if (!$.fn.DataTable.isDataTable('#tablaMaestra')) {
            $('#tablaMaestra').DataTable({
                data: dataset,
                dom: 'Bfrtip', // Habilita los botones
                buttons: [
                    { extend: 'excelHtml5', text: '📥 Descargar Excel', className: 'btn btn-success' },
                    { extend: 'pdfHtml5', text: '📥 Descargar PDF', className: 'btn btn-danger' }
                ],
                columns: [
                    { title: "#" },
                    { title: "Sucursal" },
                    { title: "Estado" },
                    { 
                        title: "Listado",
                        render: function(data) {
                            let clase = data === 'General' ? 'badge-general' : 'badge-n10';
                            return `<span class="${clase}">${data}</span>`;
                        }
                    },
                    { title: "Asignación" }
                ],
                language: { url: '//cdn.datatables.net/plug-ins/1.13.6/i18n/es-ES.json' }
            });
        }
    }
</script>
</body>
</html>
